<div id="loading">
  <h1>CHRONO HUNTER: PRAAKSARA</h1>
  <p id="welcome"></p>
</div>

<script>
const text = "Selamat datang, Penjelajah Waktu...";
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("welcome").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 100);
  }
}
window.onload = typeWriter;
</script>
